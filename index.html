<!DOCTYPE html>
<html>
<head>
  <title>Own A Slot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 42px;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    #counter {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(25, 1fr);
      gap: 6px;
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .slot {
      background: white;
      color: black;
      border-radius: 8px;
      padding: 15px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
      min-height: 60px;
    }

    .slot:hover {
      transform: scale(1.05);
      background: gold;
    }

    .sold {
      background: #ff4d4d;
      color: white;
      cursor: default;
    }

    footer {
      margin: 40px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<h1>🚀 Own A Slot</h1>
<p>Buy a permanent ad slot for $1</p>
<div id="counter">Slots Sold: 0</div>

<div class="grid" id="grid"></div>

<footer>
  © 2026 Own A Slot
</footer>

<script>
  const grid = document.getElementById("grid");
  const counter = document.getElementById("counter");

  let totalSlots = 500;
  let soldCount = 0;

  for (let i = 1; i <= totalSlots; i++) {
    let slot = document.createElement("div");
    slot.className = "slot";
    slot.innerText = "Slot " + i;

    slot.onclick = function () {
      if (slot.classList.contains("sold")) return;

      alert("This will redirect to Stripe payment ($1).");
      // Later this becomes Stripe checkout link
    };

    grid.appendChild(slot);
  }
</script>

</body>
</html>
